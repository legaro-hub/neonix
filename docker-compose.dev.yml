services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: neonix
      POSTGRES_PASSWORD: neonix_dev
      POSTGRES_DB: neonix
    ports:
      - "127.0.0.1:5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U neonix -d neonix"]
      interval: 5s
      timeout: 5s
      retries: 5

  server:
    build:
      context: ./server
      dockerfile: Dockerfile
    ports:
      - "4000:4000"
    environment:
      PORT: 4000
      NODE_ENV: development
      DATABASE_URL: postgresql://neonix:neonix_dev@postgres:5432/neonix?schema=public
      CORS_ORIGIN: http://localhost:5173
      JWT_ACCESS_SECRET: dev_access_secret_change_in_prod_9f8a2c
      JWT_REFRESH_SECRET: dev_refresh_secret_change_in_prod_3b7d1e
      ACCESS_TTL: 15m
      REFRESH_TTL: 30d
      TG_BOT_NAME: manager_neonix_bot
    depends_on:
      postgres:
        condition: service_healthy
    command: sh -c "npx prisma migrate deploy && npx prisma generate && npm run start:dev"
    volumes:
      - ./server/src:/app/src
      - ./server/uploads:/app/uploads

  client:
    image: node:20-alpine
    working_dir: /app
    ports:
      - "5173:5173"
    environment:
      VITE_API_URL: http://localhost:4000
    depends_on:
      - server
    command: sh -c "npm install && npm run dev -- --host"
    volumes:
      - ./client/src:/app/src
      - ./client/index.html:/app/index.html
      - ./client/vite.config.ts:/app/vite.config.ts
      - ./client/tsconfig.json:/app/tsconfig.json
      - ./client/tailwind.config.js:/app/tailwind.config.js
      - ./client/postcss.config.js:/app/postcss.config.js

volumes:
  pgdata:
