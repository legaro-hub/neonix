version: '3.8'

services:
  mailserver:
    image: ghcr.io/docker-mailserver/docker-mailserver:latest
    container_name: mailserver
    hostname: mail.neonix.online
    env_file: mailserver.env
    ports:
      - "25:25"
      - "465:465"
      - "587:587"
      - "143:143"
      - "993:993"
    volumes:
      - ./mailserver-data/mail-data:/var/mail
      - ./mailserver-data/mail-state:/var/mail-state
      - ./mailserver-data/mail-logs:/var/log/mail
      - ./mailserver-data/config:/tmp/docker-mailserver/
      - ./mailserver-data/dkim:/tmp/docker-mailserver/dkim
      - /etc/localtime:/etc/localtime:ro
    stop_grace_period: 1m
    restart: unless-stopped
    cap_add:
      - NET_ADMIN
      - SYS_PTRACE
    healthcheck:
      test: ["CMD", "docker-emailserver-healthcheck.sh"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
